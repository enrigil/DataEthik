<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datenethik & Privatsphäre</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

  <div id="root"></div>

  <script type="text/babel">
    // 1. Wir holen uns die nötigen React-Funktionen
    const { useState, useEffect, useRef } = React;
    
    // 2. Wir holen uns alle Icons aus der geladenen Lucide-Bibliothek
    const { 
      Database, Server, Share2, ShieldAlert, Brain, CheckCircle, ChevronRight, Info,
      AlertTriangle, Lightbulb, Smartphone, Cloud, ArrowRight, Eye, EyeOff, MousePointerClick,
      Unlock, Lock, Activity, ShieldCheck, Gamepad2, Layers, Network, Globe, Search, MessageSquare
    } = window.lucideReact;

    // --- Interaktive Komponenten für die einzelnen Sektionen ---

    const IntroSection = () => (
      <div className="space-y-6">
        <div className="flex flex-col md:flex-row items-center gap-8 mb-8 border-b pb-8">
          <div className="flex-1 space-y-4">
            <h2 className="text-4xl font-extrabold text-slate-800 tracking-tight">Willkommen in der <span className="text-blue-600">Daten-Matrix</span></h2>
            <p className="text-xl text-slate-600 leading-relaxed">
              Mit jedem Klick, jedem Wischen und jedem Schritt hinterlassen wir digitale Spuren. 
              Dieses interaktive Modul beleuchtet die verborgene Welt unserer Daten.
            </p>
          </div>
          <div className="w-48 h-48 relative shrink-0">
            <div className="absolute inset-0 bg-blue-100 rounded-full animate-pulse opacity-50"></div>
            <div className="absolute inset-4 bg-blue-200 rounded-full animate-pulse opacity-70" style={{ animationDelay: '0.5s' }}></div>
            <div className="absolute inset-0 flex items-center justify-center">
              <Brain className="w-20 h-20 text-blue-600 relative z-10" />
            </div>
          </div>
        </div>

        <div className="bg-gradient-to-r from-blue-50 border border-blue-100 p-6 rounded-xl shadow-sm">
          <h3 className="text-lg font-bold text-blue-800 flex items-center gap-2 mb-3">
            <Info size={24} /> Dein Lernziel
          </h3>
          <p className="text-blue-900 leading-relaxed">
            Du wirst verstehen, wie die Datenökonomie funktioniert, welche psychologischen Tricks auf dich angewendet werden und wie schnell man scheinbar anonyme Daten entschlüsseln kann. 
            <strong>Klicke auf "Nächstes Thema", um zu starten.</strong>
          </p>
        </div>
      </div>
    );

    const WhatSection = () => {
      const [dataPoints, setDataPoints] = useState({ loc: false, search: false, like: false, scroll: false });
      const score = Object.values(dataPoints).filter(Boolean).length;
      const percentage = (score / 4) * 100;

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Was wird gespeichert?</h2>
          <p className="text-slate-600 leading-relaxed">
            Wir unterscheiden zwischen Daten, die wir <strong>aktiv</strong> hergeben, und solchen, die <strong>passiv</strong> im Hintergrund gesammelt werden. 
          </p>
          
          <div className="bg-white border-2 border-slate-200 p-6 rounded-xl shadow-sm mt-6">
            <h3 className="font-bold text-xl text-slate-800 mb-4 flex items-center gap-2">
              <Activity className="text-blue-500" /> Interaktives Experiment: Dein Daten-Rucksack
            </h3>
            <p className="text-slate-600 text-sm mb-4">Klicke auf die Aktionen und beobachte, wie sich dein digitales Profil füllt.</p>
            
            <div className="grid grid-cols-2 gap-3 mb-6">
              <button 
                onClick={() => setDataPoints(p => ({...p, loc: true}))}
                disabled={dataPoints.loc}
                className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.loc ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
              >
                {dataPoints.loc ? <CheckCircle size={16}/> : '📍'} GPS aktivieren (Passiv)
              </button>
              <button 
                onClick={() => setDataPoints(p => ({...p, search: true}))}
                disabled={dataPoints.search}
                className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.search ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
              >
                {dataPoints.search ? <CheckCircle size={16}/> : '🔍'} Google-Suche (Aktiv)
              </button>
              <button 
                onClick={() => setDataPoints(p => ({...p, like: true}))}
                disabled={dataPoints.like}
                className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.like ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
              >
                {dataPoints.like ? <CheckCircle size={16}/> : '❤️'} Bild liken (Aktiv)
              </button>
              <button 
                onClick={() => setDataPoints(p => ({...p, scroll: true}))}
                disabled={dataPoints.scroll}
                className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.scroll ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
              >
                {dataPoints.scroll ? <CheckCircle size={16}/> : '⏱️'} Verweildauer messen (Passiv)
              </button>
            </div>

            <div>
              <div className="flex justify-between text-xs font-bold text-slate-500 mb-1">
                <span>Profil-Genauigkeit</span>
                <span>{percentage}%</span>
              </div>
              <div className="w-full bg-slate-200 rounded-full h-4 overflow-hidden">
                <div 
                  className="bg-gradient-to-r from-blue-400 to-indigo-600 h-4 rounded-full transition-all duration-700 ease-out" 
                  style={{ width: `${percentage}%` }}
                ></div>
              </div>
              <p className="text-xs text-slate-500 mt-2 text-center h-4">
                {score === 0 && "Dein Profil ist leer."}
                {score > 0 && score < 4 && "Es werden erste Muster erkannt..."}
                {score === 4 && "Algorithmen können dein Verhalten jetzt vorhersagen!"}
              </p>
            </div>
          </div>
        </div>
      );
    };

    const WhereSection = () => {
      const [animating, setAnimating] = useState(true);

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Wo und wie werden sie gespeichert?</h2>
          
          <p className="text-slate-600 leading-relaxed">
            Die "Cloud" klingt leicht und flauschig, ist in Wahrheit aber eine gigantische, laute und extrem energiehungrige Infrastruktur aus riesigen Rechenzentren (Serverfarmen).
          </p>

          <div className="bg-slate-900 rounded-xl p-8 my-8 relative overflow-hidden flex flex-col items-center justify-center border border-slate-700 shadow-inner">
            <h3 className="text-white font-semibold mb-6 z-10">Datenfluss in Echtzeit</h3>
            
            <div className="flex items-center justify-between w-full max-w-md relative z-10">
              <div className="text-center">
                <div className="bg-slate-800 p-4 rounded-full border border-slate-600 mb-2">
                  <Smartphone className="text-blue-400 w-10 h-10" />
                </div>
                <span className="text-slate-400 text-sm">Dein Gerät</span>
              </div>

              <div className="flex-1 flex justify-center items-center px-4 overflow-hidden h-10 relative">
                <div className="w-full h-0.5 bg-slate-700 absolute top-1/2 -translate-y-1/2 z-0"></div>
                {animating && (
                  <React.Fragment>
                    <div className="w-3 h-3 bg-blue-500 rounded-full absolute animate-[slideRight_2s_linear_infinite] left-0"></div>
                    <div className="w-3 h-3 bg-purple-500 rounded-full absolute animate-[slideRight_2s_linear_infinite_0.7s] left-0 opacity-0"></div>
                    <div className="w-3 h-3 bg-green-500 rounded-full absolute animate-[slideRight_2s_linear_infinite_1.4s] left-0 opacity-0"></div>
                  </React.Fragment>
                )}
                <style dangerouslySetInnerHTML={{__html: `
                  @keyframes slideRight {
                    0% { left: 10%; opacity: 0; }
                    10% { opacity: 1; }
                    90% { opacity: 1; }
                    100% { left: 90%; opacity: 0; }
                  }
                `}} />
              </div>

              <div className="text-center">
                <div className="bg-slate-800 p-4 rounded-full border border-slate-600 mb-2 relative group">
                  <Cloud className="text-indigo-400 w-10 h-10" />
                  <div className="absolute inset-0 bg-indigo-500 rounded-full opacity-20 blur-xl"></div>
                </div>
                <span className="text-slate-400 text-sm">Data Lake (Server)</span>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
              <strong className="text-blue-800 block mb-1">Data Lakes</strong>
              <span className="text-slate-700 text-sm">Statt ordentlicher Tabellen werden heute oft alle Rohdaten in riesige "Seen" geworfen. Erst KIs durchsuchen dieses Chaos später nach Mustern.</span>
            </div>
            <div className="bg-purple-50 p-4 rounded-lg border border-purple-100">
              <strong className="text-purple-800 block mb-1">Schattenprofile</strong>
              <span className="text-slate-700 text-sm">Auch wenn du keinen Account hast, verbinden Tracker (Cookies, Fingerprinting) deine Spuren im Netz zu einem versteckten Profil.</span>
            </div>
          </div>
        </div>
      );
    };

    const HowSection = () => {
      const [activeCard, setActiveCard] = useState(null);

      const cards = [
        { id: 1, title: 'Personalisierung', color: 'bg-indigo-100', textColor: 'text-indigo-800', desc: 'Netflix und TikTok nutzen deine Sehgewohnheiten, um das Produkt so "süchtig machend" wie möglich zu machen.' },
        { id: 2, title: 'Mikro-Targeting', color: 'bg-emerald-100', textColor: 'text-emerald-800', desc: 'Werbung wird exakt auf deine Schwächen zugeschnitten (z.B. Snack-Werbung spät abends, wenn du oft wach bist).' },
        { id: 3, title: 'Datenhandel', color: 'bg-rose-100', textColor: 'text-rose-800', desc: 'Schattenfirmen (Data Broker) erstellen Profile über deine Gesundheit oder Bonität und verkaufen diese im Hintergrund.' },
        { id: 4, title: 'KI-Training', color: 'bg-amber-100', textColor: 'text-amber-800', desc: 'Künstliche Intelligenzen (wie ChatGPT) werden mit den Milliarden an Texten und Bildern trainiert, die wir kostenlos liefern.' },
      ];

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Wie werden sie genutzt?</h2>
          <p className="text-slate-600 leading-relaxed">
            Daten sind das Öl des 21. Jahrhunderts – aber erst die Raffinerie (die Auswertung) macht sie wertvoll. 
            Klicke auf die Karten, um die Geschäftsmodelle aufzudecken.
          </p>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
            {cards.map(card => (
              <button 
                key={card.id}
                onClick={() => setActiveCard(activeCard === card.id ? null : card.id)}
                className={`text-left transition-all duration-300 rounded-xl p-5 border-2 relative overflow-hidden
                  ${activeCard === card.id ? `${card.color} border-transparent shadow-md` : 'bg-white border-slate-200 hover:border-slate-300'}`}
              >
                <h3 className={`font-bold text-lg ${activeCard === card.id ? card.textColor : 'text-slate-800'}`}>
                  {card.title}
                </h3>
                
                <div className={`mt-3 transition-all duration-500 overflow-hidden ${activeCard === card.id ? 'max-h-40 opacity-100' : 'max-h-0 opacity-0'}`}>
                  <p className="text-sm text-slate-700 leading-relaxed">{card.desc}</p>
                </div>

                {activeCard !== card.id && (
                  <p className="text-xs text-slate-400 mt-2 italic flex items-center gap-1">Klicken zum Aufdecken <ArrowRight size={12}/></p>
                )}
              </button>
            ))}
          </div>
        </div>
      );
    };

    const SecuritySection = () => {
      const [revealed, setRevealed] = useState(0);
      const anonymityLevel = [100, 82, 41, 5][revealed];
      
      const stepColors = ["bg-green-500", "bg-yellow-400", "bg-orange-500", "bg-red-600"];

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Wie sicher sind die Daten?</h2>
          <p className="text-slate-600 leading-relaxed">
            Oft heißt es: <em>"Die Daten werden anonymisiert."</em> 
            Die interaktive Demo unten zeigt, wie extrem leicht sich diese "Anonymität" aufheben lässt (De-Anonymisierung).
          </p>

          <div className="bg-slate-50 border border-slate-200 rounded-xl p-6 shadow-sm">
            <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
              <Unlock className="text-red-500" /> Simulator: Finde die Person
            </h3>
            
            <div className="mb-6 flex justify-between items-end">
              <div>
                <p className="text-sm text-slate-500 uppercase tracking-wide font-semibold">Anonymitäts-Status</p>
                <p className={`text-4xl font-extrabold ${anonymityLevel > 50 ? 'text-green-600' : anonymityLevel > 10 ? 'text-orange-500' : 'text-red-600'}`}>
                  {anonymityLevel}%
                </p>
              </div>
              <div className="w-1/2 bg-slate-200 rounded-full h-4">
                <div 
                  className={`h-4 rounded-full transition-all duration-500 ${stepColors[revealed]}`}
                  style={{ width: `${anonymityLevel}%` }}
                ></div>
              </div>
            </div>

            <div className="space-y-3">
              <button 
                onClick={() => setRevealed(Math.max(revealed, 1))}
                className={`w-full text-left p-4 rounded-lg border transition-all ${revealed >= 1 ? 'bg-red-50 border-red-200 text-red-900' : 'bg-white hover:bg-slate-100 border-slate-200'}`}
              >
                <div className="flex justify-between items-center">
                  <strong>1. Datenpunkt: Postleitzahl (80331) hinzufügen</strong>
                  {revealed >= 1 ? <Eye size={18} className="text-red-500" /> : <EyeOff size={18} className="text-slate-400" />}
                </div>
              </button>
              
              <button 
                disabled={revealed < 1}
                onClick={() => setRevealed(Math.max(revealed, 2))}
                className={`w-full text-left p-4 rounded-lg border transition-all ${revealed < 1 ? 'opacity-50 cursor-not-allowed bg-slate-100' : revealed >= 2 ? 'bg-red-50 border-red-200 text-red-900' : 'bg-white hover:bg-slate-100 border-slate-200'}`}
              >
                <div className="flex justify-between items-center">
                  <strong>2. Datenpunkt: Geburtsjahr (1985) hinzufügen</strong>
                  {revealed >= 2 ? <Eye size={18} className="text-red-500" /> : <EyeOff size={18} className="text-slate-400" />}
                </div>
              </button>

              <button 
                disabled={revealed < 2}
                onClick={() => setRevealed(3)}
                className={`w-full text-left p-4 rounded-lg border transition-all ${revealed < 2 ? 'opacity-50 cursor-not-allowed bg-slate-100' : revealed >= 3 ? 'bg-red-100 border-red-300 text-red-900 font-bold' : 'bg-white hover:bg-slate-100 border-slate-200'}`}
              >
                <div className="flex justify-between items-center">
                  <strong>3. Datenpunkt: Geschlecht (Männlich) hinzufügen</strong>
                  {revealed >= 3 ? <Lock size={18} className="text-red-600" /> : <EyeOff size={18} className="text-slate-400" />}
                </div>
              </button>
            </div>

            {revealed === 3 && (
              <div className="mt-4 p-4 bg-red-100 border border-red-300 rounded-lg text-red-800 text-sm animate-pulse">
                <strong>Schockierende Wahrheit:</strong> Studien (wie z.B. vom MIT) zeigen, dass bereits 3 solcher angeblich "anonymen" Datenpunkte ausreichen, um 87% der Menschen in den USA eindeutig zu identifizieren. Wirkliche Anonymität im Netz ist extrem schwer herzustellen.
              </div>
            )}
            
            {revealed > 0 && revealed < 3 && (
              <div className="mt-4 text-center text-sm text-slate-500">
                <button onClick={() => setRevealed(0)} className="underline hover:text-slate-800">Zurücksetzen</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const PsychologySection = () => {
      const [bannerState, setBannerState] = useState('active');

      return (
        <div className="space-y-6 relative">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Warum stört es uns nicht?</h2>
          
          {bannerState === 'active' && (
            <div className="absolute inset-0 z-20 flex flex-col justify-end bg-white/60 backdrop-blur-sm rounded-xl overflow-hidden">
              <div className="bg-slate-800 p-6 shadow-2xl translate-y-0 transition-transform">
                <h3 className="text-white font-bold text-xl mb-2 flex items-center gap-2"><Lock size={20}/> Wir schätzen Ihre Privatsphäre</h3>
                <p className="text-slate-300 text-sm mb-6 leading-relaxed">
                  Wir und unsere 842 Partner speichern und greifen auf Informationen auf Ihrem Gerät zu. Dies dient der optimalen Bereitstellung personalisierter Werbung und endloser AGB-Lektüre, die ohnehin niemand liest.
                </p>
                <div className="flex flex-col sm:flex-row items-center gap-3 w-full">
                  <button 
                    onClick={() => setBannerState('accepted')}
                    className="w-full sm:w-2/3 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-lg shadow-lg transform hover:scale-[1.02] transition-all text-lg flex justify-center items-center gap-2"
                  >
                    <CheckCircle /> ALLE AKZEPTIEREN
                  </button>
                  <button 
                    onClick={() => setBannerState('managed')}
                    className="w-full sm:w-1/3 text-slate-400 hover:text-white text-xs underline py-2"
                  >
                    Einstellungen aufwendig verwalten
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className={`transition-all duration-1000 ${bannerState === 'active' ? 'opacity-20 blur-sm pointer-events-none' : 'opacity-100'}`}>
            <p className="text-slate-600 leading-relaxed font-medium mb-6">
              Die meisten Menschen sagen, dass ihnen Datenschutz wichtig ist. Dennoch haben wir gerade (vermutlich) wieder auf "Akzeptieren" geklickt. Das nennt man das <strong>Privacy Paradox</strong>.
            </p>

            {bannerState === 'accepted' && (
              <div className="bg-red-50 text-red-800 p-4 border border-red-200 rounded-lg mb-6 flex gap-3">
                <AlertTriangle className="shrink-0 mt-1" />
                <div>
                  <strong>Erwischt!</strong> Du hast auf den großen grünen Button geklickt. Dieses bewusste Design-Element nennt man <em>Dark Pattern</em>. Es nutzt unsere psychologische Neigung zur Faulheit aus.
                </div>
              </div>
            )}
            
            {bannerState === 'managed' && (
              <div className="bg-green-50 text-green-800 p-4 border border-green-200 rounded-lg mb-6 flex gap-3">
                <CheckCircle className="shrink-0 mt-1" />
                <div>
                  <strong>Sehr gut!</strong> Du hast der Versuchung widerstanden und den unscheinbaren Link geklickt. Das erfordert kognitive Anstrengung, die die meisten Webseiten uns durch schlechtes Design ("Dark Patterns") abtrainieren wollen.
                </div>
              </div>
            )}

            <div className="grid sm:grid-cols-2 gap-4 mt-4">
              <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                <h3 className="font-bold text-purple-700 flex items-center gap-2 mb-2"><MousePointerClick size={18}/> 1. Sofortige Belohnung</h3>
                <p className="text-slate-600 text-sm">Unser Gehirn bewertet den schnellen Dopamin-Kick (das Video jetzt sehen) viel höher als abstrakte Risiken in der Zukunft (Datenmissbrauch).</p>
              </div>

              <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                <h3 className="font-bold text-purple-700 flex items-center gap-2 mb-2"><Brain size={18}/> 2. Privacy Fatigue</h3>
                <p className="text-slate-600 text-sm">Ständige Cookie-Banner ermüden uns. Es entsteht eine "erlernte Hilflosigkeit": Wir glauben ohnehin keine Kontrolle mehr zu haben und resignieren.</p>
              </div>

              <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                <h3 className="font-bold text-purple-700 flex items-center gap-2 mb-2"><EyeOff size={18}/> 3. Unsichtbarkeit</h3>
                <p className="text-slate-600 text-sm">Wenn uns ein echter Mensch auf Schritt und Tritt folgen würde, würden wir fliehen. Da die Server unsichtbar sind, bleibt unser Fluchtinstinkt aus.</p>
              </div>
            </div>
            
            {bannerState !== 'active' && (
               <div className="mt-4 text-center">
                 <button onClick={() => setBannerState('active')} className="text-sm text-slate-500 underline hover:text-slate-800">Banner-Simulation neustarten</button>
               </div>
            )}
          </div>
        </div>
      );
    };

    const ProtectionSection = () => {
      const [torStep, setTorStep] = useState(0);

      const nextStep = () => {
        if (torStep < 4) setTorStep(torStep + 1);
      };
      const resetTor = () => setTorStep(0);

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Wie schützt man sich?</h2>
          
          <p className="text-slate-600 leading-relaxed font-medium">
            Hundertprozentigen Schutz gibt es nicht, solange du online bist. Aber du kannst es den Datensammlern deutlich schwerer machen, indem du die richtigen Werkzeuge nutzt.
          </p>

          <div className="grid md:grid-cols-2 gap-4 mt-4">
            <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
              <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><Globe size={18} className="text-blue-500" /> Browser-Wahl</h3>
              <p className="text-slate-600 text-sm">Verzichte auf Chrome. Nutze Alternativen wie <strong>Firefox</strong> (mit strengem Tracking-Schutz) oder <strong>Brave</strong>, die Tracker standardmäßig blockieren.</p>
            </div>
            <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
              <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><Network size={18} className="text-blue-500" /> VPN (Virtual Private Network)</h3>
              <p className="text-slate-600 text-sm">Ein VPN verschlüsselt deinen Traffic im lokalen Netzwerk und verbirgt deine IP-Adresse vor der Webseite. Wichtig: Der VPN-Anbieter selbst sieht alles – wähle also einen seriösen!</p>
            </div>
          </div>

          <div className="mt-8 bg-slate-50 border-2 border-slate-200 rounded-xl p-6 shadow-sm">
            <h3 className="font-bold text-xl text-slate-800 mb-2 flex items-center gap-2">
              <Layers className="text-purple-600" /> Deep Dive: Der Tor Browser
            </h3>
            <p className="text-slate-600 text-sm mb-6">
              Der Goldstandard der Anonymität. Tor steht für <em>"The Onion Router"</em> (Zwiebel-Router). Deine Daten werden mehrfach verschlüsselt und über zufällige Server (Knotenpunkte) weltweit umgeleitet. 
            </p>

            <div className="bg-slate-900 p-6 rounded-xl text-white font-mono text-sm relative overflow-hidden shadow-inner">
              <div className="flex justify-between items-center mb-10">
                 <div className="text-center z-10">
                    <Smartphone className="mx-auto text-blue-400 mb-2 w-8 h-8"/>
                    <span className="text-xs">Dein PC</span>
                 </div>
                 <div className="flex-1 px-2 sm:px-6 flex justify-between relative">
                    <div className="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-700 -translate-y-1/2 z-0"></div>
                    
                    <div className={`z-10 p-2 sm:p-3 rounded-full border-2 transition-all duration-500 ${torStep >= 1 ? 'border-green-400 bg-slate-800 scale-110 shadow-[0_0_15px_rgba(74,222,128,0.3)]' : 'border-slate-600 bg-slate-800'}`}>
                       <Layers className={torStep >= 1 ? 'text-green-400' : 'text-slate-600'} size={20}/>
                       <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] sm:text-xs whitespace-nowrap">Entry Node</span>
                    </div>
                    <div className={`z-10 p-2 sm:p-3 rounded-full border-2 transition-all duration-500 ${torStep >= 2 ? 'border-yellow-400 bg-slate-800 scale-110 shadow-[0_0_15px_rgba(250,204,21,0.3)]' : 'border-slate-600 bg-slate-800'}`}>
                       <Layers className={torStep >= 2 ? 'text-yellow-400' : 'text-slate-600'} size={20}/>
                       <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] sm:text-xs whitespace-nowrap">Relay Node</span>
                    </div>
                    <div className={`z-10 p-2 sm:p-3 rounded-full border-2 transition-all duration-500 ${torStep >= 3 ? 'border-red-400 bg-slate-800 scale-110 shadow-[0_0_15px_rgba(248,113,113,0.3)]' : 'border-slate-600 bg-slate-800'}`}>
                       <Layers className={torStep >= 3 ? 'text-red-400' : 'text-slate-600'} size={20}/>
                       <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] sm:text-xs whitespace-nowrap">Exit Node</span>
                    </div>
                 </div>
                 <div className="text-center z-10">
                    <Server className="mx-auto text-purple-400 mb-2 w-8 h-8"/>
                    <span className="text-xs">Website</span>
                 </div>
              </div>
              
              <div className="bg-slate-800 border border-slate-700 p-4 rounded-lg min-h-[120px] flex items-center justify-center text-center transition-all duration-300">
                {torStep === 0 && <p><strong>Zwiebel-Routing:</strong> Klicke auf "Senden". Dein Datenpaket wird 3-fach verschlüsselt (Schalen), bevor es deinen PC verlässt.</p>}
                {torStep === 1 && <p className="text-green-400"><strong>Schritt 1 (Entry):</strong> Der erste Server entschlüsselt die 1. Schale. Er sieht deine IP-Adresse, aber nicht dein Ziel (Webseite).</p>}
                {torStep === 2 && <p className="text-yellow-400"><strong>Schritt 2 (Relay):</strong> Der mittlere Server entschlüsselt die 2. Schale. Er kennt nur Vorgänger und Nachfolger, sonst nichts.</p>}
                {torStep === 3 && <p className="text-red-400"><strong>Schritt 3 (Exit):</strong> Der letzte Server entschlüsselt die 3. Schale. Er sieht das Ziel, weiß aber NICHT, woher das Paket ursprünglich kam.</p>}
                {torStep === 4 && <p className="text-purple-400"><strong>Ziel erreicht:</strong> Die Webseite sieht nur die IP des Exit-Nodes. Du bist anonym! <br/><span className="text-slate-400 text-xs">(Achtung: Logins auf der Seite heben diese Anonymität logischerweise wieder auf).</span></p>}
              </div>

              <div className="mt-6 flex justify-center gap-4">
                {torStep < 4 ? (
                   <button onClick={nextStep} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-lg font-bold transition-colors shadow-lg">
                      {torStep === 0 ? 'Daten Senden' : 'Weiterleiten'}
                   </button>
                ) : (
                   <button onClick={resetTor} className="bg-slate-700 hover:bg-slate-600 text-white px-8 py-2 rounded-lg font-bold transition-colors">
                      Neuer Versuch
                   </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const QuizSection = () => {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [feedbackLog, setFeedbackLog] = useState([]);

      const questions = [
        {
          icon: Globe,
          title: "Browser-Wahl",
          question: "Welchen Browser nutzt du am häufigsten?",
          options: [
            { text: "Chrome / Edge", points: 0, comment: "Datensammler. Schnell und bequem, aber deine Daten sind der Preis." },
            { text: "Safari", points: 1, comment: "Solide. Apple blockiert Tracker, ist aber als System eine Blackbox." },
            { text: "Firefox / Brave", points: 2, comment: "Super! Starker integrierter Schutz und Fokus auf Privatsphäre." },
            { text: "Tor Browser", points: 3, comment: "Hardcore. Höchste Anonymität, aber im Alltag oft unpraktisch langsam." }
          ]
        },
        {
          icon: Search,
          title: "Suchmaschine",
          question: "Wo suchst du im Alltag nach Informationen?",
          options: [
            { text: "Google / Bing", points: 0, comment: "Jede Suchanfrage wird für dein Profil gespeichert und verknüpft." },
            { text: "Startpage / Ecosia", points: 1, comment: "Guter Kompromiss. Anonymisierte Suche oder Fokus auf Umweltschutz." },
            { text: "DuckDuckGo", points: 2, comment: "Klassiker für Privatsphäre. Keine personalisierten Suchprofile." }
          ]
        },
        {
          icon: Network,
          title: "Verbindung & VPN",
          question: "Nutzt du einen VPN-Dienst?",
          options: [
            { text: "Nein, nie", points: 0, comment: "Dein Internet-Provider und lokale Netzwerke sehen alle Seiten, die du ansteuerst." },
            { text: "Ja, einen kostenlosen", points: 0, comment: "Achtung: Kostenlose VPNs verkaufen oft genau die Daten, die sie eigentlich schützen sollen!" },
            { text: "Ja, einen bezahlten", points: 2, comment: "Sehr gut. Verbirgt deine IP und verschlüsselt deinen Tunnel zuverlässig." }
          ]
        },
        {
          icon: MessageSquare,
          title: "Messenger",
          question: "Wie schreibst du primär mit Freunden?",
          options: [
            { text: "WhatsApp / Insta", points: 0, comment: "Der Inhalt ist zwar verschlüsselt, aber Metadaten (wer, wann, wo) gehen an Meta." },
            { text: "Telegram", points: 0, comment: "Mythos: Chats sind hier standardmäßig NICHT Ende-zu-Ende verschlüsselt!" },
            { text: "Signal / Threema", points: 3, comment: "Goldstandard. Ende-zu-Ende verschlüsselt und speichert fast keine Metadaten." }
          ]
        }
      ];

      const handleAnswer = (points, comment) => {
        setScore(score + points);
        setFeedbackLog([...feedbackLog, { q: questions[currentQ].title, comment }]);
        
        if (currentQ < questions.length - 1) {
          setCurrentQ(currentQ + 1);
        } else {
          setShowResult(true);
        }
      };

      const resetQuiz = () => {
        setCurrentQ(0);
        setScore(0);
        setShowResult(false);
        setFeedbackLog([]);
      };

      let resultProfile = { title: "", desc: "", color: "", bg: "", textColor: "" };
      if (score <= 3) {
        resultProfile = { title: "Der Gläserne Bürger", desc: "Komfort ist dir wichtiger als Privatsphäre. Du bist ein gefundenes Fressen für Werbenetzwerke und Tech-Giganten wissen vermutlich mehr über dich als deine Freunde.", color: "border-red-300", bg: "bg-red-50", textColor: "text-red-700" };
      } else if (score <= 7) {
        resultProfile = { title: "Der Durchschnitts-Surfer", desc: "Du achtest gelegentlich auf deine Daten und hast erste Schritte gemacht. Dennoch gibt es große Lücken, durch die fleißig getrackt wird.", color: "border-orange-300", bg: "bg-orange-50", textColor: "text-orange-700" };
      } else {
        resultProfile = { title: "Privacy Ninja", desc: "Hervorragend! Du nutzt starke Tools und machst es Datensammlern extrem schwer. Edward Snowden wäre stolz auf dich.", color: "border-green-300", bg: "bg-green-50", textColor: "text-green-700" };
      }

      const CurrentIcon = questions[currentQ]?.icon || Gamepad2;

      return (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Datenschutz-Check: Wie sicher bist du?</h2>
          
          {!showResult ? (
            <div className="bg-white border-2 border-slate-200 rounded-xl p-6 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                <span className="text-sm font-bold text-slate-500 uppercase tracking-wide">
                  Frage {currentQ + 1} von {questions.length}
                </span>
                <span className="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">
                  Punkte: {score}
                </span>
              </div>

              <div className="mb-8">
                <div className="flex items-center gap-3 mb-2">
                  <div className="bg-blue-50 p-2 rounded-lg"><CurrentIcon className="text-blue-600" /></div>
                  <h3 className="text-xl font-bold text-slate-800">{questions[currentQ].title}</h3>
                </div>
                <p className="text-slate-600 text-lg ml-12">{questions[currentQ].question}</p>
              </div>

              <div className="space-y-3">
                {questions[currentQ].options.map((option, idx) => (
                  <button 
                    key={idx}
                    onClick={() => handleAnswer(option.points, option.comment)}
                    className="w-full text-left p-4 rounded-lg border-2 border-slate-100 bg-slate-50 hover:border-blue-300 hover:bg-blue-50 transition-all duration-200 group relative overflow-hidden"
                  >
                    <div className="flex items-center justify-between z-10 relative">
                      <span className="font-medium text-slate-700 group-hover:text-blue-800">{option.text}</span>
                      <ChevronRight size={18} className="text-slate-400 group-hover:text-blue-600 transform group-hover:translate-x-1 transition-transform" />
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="animate-fadeIn">
              <div className={`border-2 rounded-xl p-8 text-center mb-8 shadow-sm ${resultProfile.bg} ${resultProfile.color}`}>
                <h3 className={`text-3xl font-extrabold mb-3 ${resultProfile.textColor}`}>
                  Dein Score: {score} / 10
                </h3>
                <div className={`inline-block px-4 py-1 rounded-full font-bold text-sm mb-4 bg-white/50 ${resultProfile.textColor}`}>
                  Profil: {resultProfile.title}
                </div>
                <p className="text-slate-700 text-lg leading-relaxed">{resultProfile.desc}</p>
              </div>

              <h4 className="font-bold text-slate-800 text-xl mb-4">Deine Auswertung im Detail:</h4>
              <div className="space-y-3 mb-8">
                {feedbackLog.map((log, idx) => (
                  <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm flex items-start gap-3">
                    <CheckCircle className="text-blue-500 shrink-0 mt-0.5" size={18}/>
                    <div>
                      <strong className="text-slate-700 block text-sm">{log.q}</strong>
                      <span className="text-slate-600">{log.comment}</span>
                    </div>
                  </div>
                ))}
              </div>

              <div className="text-center">
                <button 
                  onClick={resetQuiz}
                  className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-lg font-bold transition-colors inline-flex items-center gap-2"
                >
                  <Activity size={18} /> Check wiederholen
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const sections = [
      { id: 'intro', title: 'Einführung', icon: Lightbulb, Component: IntroSection },
      { id: 'what', title: 'Was wird gespeichert?', icon: Database, Component: WhatSection },
      { id: 'where', title: 'Wo und wie?', icon: Server, Component: WhereSection },
      { id: 'how', title: 'Wie genutzt?', icon: Share2, Component: HowSection },
      { id: 'security', title: 'Wie sicher?', icon: ShieldAlert, Component: SecuritySection },
      { id: 'psychology', title: 'Die Psychologie', icon: Brain, Component: PsychologySection },
      { id: 'protection', title: 'Wie schützt man sich?', icon: ShieldCheck, Component: ProtectionSection },
      { id: 'quiz', title: 'Dein Daten-Score', icon: Gamepad2, Component: QuizSection }
    ];

    function App() {
      const [activeSection, setActiveSection] = useState(sections[0].id);
      const [readSections, setReadSections] = useState([sections[0].id]);
      const topRef = useRef(null);

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        if (topRef.current) {
          topRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        if (!readSections.includes(activeSection)) {
          setReadSections(prev => [...prev, activeSection]);
        }
      }, [activeSection, readSections]);

      const currentIndex = sections.findIndex(s => s.id === activeSection);
      const progress = (readSections.length / sections.length) * 100;

      const goToNext = () => {
        if (currentIndex < sections.length - 1) {
          setActiveSection(sections[currentIndex + 1].id);
        }
      };

      const ActiveComponent = sections[currentIndex].Component;

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900" ref={topRef}>
          <header className="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 p-2 rounded-lg shadow-inner">
                  <ShieldAlert className="text-white h-6 w-6" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-800">Datenethik & Privatsphäre</h1>
                  <p className="text-sm text-slate-500 hidden sm:block">Interaktives Web-Lernmodul</p>
                </div>
              </div>
              
              <div className="w-full md:w-64">
                <div className="flex justify-between text-xs text-slate-500 mb-1 font-medium">
                  <span>Lernfortschritt</span>
                  <span>{Math.round(progress)}%</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2.5 shadow-inner">
                  <div 
                    className="bg-blue-600 h-2.5 rounded-full transition-all duration-700 ease-out shadow-sm" 
                    style={{ width: `${progress}%` }}
                  ></div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
            <aside className="w-full md:w-1/3 lg:w-1/4 shrink-0">
              <nav className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sticky top-28">
                <ul className="space-y-1">
                  {sections.map((section) => {
                    const Icon = section.icon;
                    const isActive = activeSection === section.id;
                    const isRead = readSections.includes(section.id);
                    
                    return (
                      <li key={section.id}>
                        <button
                          onClick={() => setActiveSection(section.id)}
                          className={`w-full flex items-center justify-between px-4 py-3 rounded-lg transition-all duration-200 text-left border ${
                            isActive 
                              ? 'bg-blue-50 text-blue-700 font-bold border-blue-200 shadow-sm' 
                              : 'text-slate-600 border-transparent hover:bg-slate-50 hover:border-slate-200'
                          }`}
                        >
                          <div className="flex items-center gap-3">
                            <Icon size={18} className={isActive ? 'text-blue-600' : 'text-slate-400'} />
                            <span className="text-sm sm:text-base">{section.title}</span>
                          </div>
                          {isRead && !isActive && <CheckCircle size={16} className="text-green-500" />}
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </nav>
            </aside>

            <section className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[60vh] flex flex-col">
              <div className="flex-1 animate-fadeIn">
                <ActiveComponent />
              </div>

              <div className="mt-12 pt-8 border-t border-slate-100 flex justify-end">
                {currentIndex < sections.length - 1 ? (
                  <button 
                    onClick={goToNext}
                    className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 transition-all transform hover:scale-[1.02] shadow-md hover:shadow-lg"
                  >
                    Nächstes Thema <ChevronRight size={20} />
                  </button>
                ) : (
                  <div className="bg-green-50 border-2 border-green-200 text-green-800 px-6 py-6 rounded-xl font-bold flex flex-col items-center gap-3 w-full justify-center text-center shadow-inner">
                    <CheckCircle size={48} className="text-green-500" />
                    <span className="text-xl">Herzlichen Glückwunsch!</span>
                    <span className="text-sm font-normal text-green-700">Du hast das Modul erfolgreich abgeschlossen. Deine Daten-Awareness ist nun auf dem höchsten Level!</span>
                  </div>
                )}
              </div>
            </section>
          </main>
        </div>
      );
    }

    // 3. React ins HTML einklinken
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
