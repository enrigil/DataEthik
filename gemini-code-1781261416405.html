<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datenethik & Privatsphäre</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        slideRight: {
                            '0%': { left: '10%', opacity: '0' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { left: '90%', opacity: '0' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    },
                    animation: {
                        'slideRight-1': 'slideRight 2s linear infinite',
                        'slideRight-2': 'slideRight 2s linear infinite 0.7s',
                        'slideRight-3': 'slideRight 2s linear infinite 1.4s',
                        'fadeIn': 'fadeIn 0.5s ease-out forwards'
                    }
                }
            }
        }
    </script>

    <style>
        /* Zentriert die Icons perfekt */
        .material-symbols-outlined {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        // Wir ziehen uns die benötigten Hooks direkt aus dem globalen React-Objekt
        const { useState, useEffect, useRef } = React;

        // Unser eigener Icon-Wrapper, der die Google Material Icons nutzt
        const Icon = ({ name, className = "", size = 24 }) => (
            <span
                className={`material-symbols-outlined flex-shrink-0 ${className}`}
                style={{ fontSize: `${size}px`, width: `${size}px`, height: `${size}px` }}
            >
                {name}
            </span>
        );

        // --- Interaktive Komponenten für die einzelnen Sektionen ---

        const IntroSection = () => (
          <div className="space-y-6">
            <div className="flex flex-col md:flex-row items-center gap-8 mb-8 border-b pb-8">
              <div className="flex-1 space-y-4">
                <h2 className="text-4xl font-extrabold text-slate-800 tracking-tight">Willkommen in der <span className="text-blue-600">Daten-Matrix</span></h2>
                <p className="text-xl text-slate-600 leading-relaxed">
                  Mit jedem Klick, jedem Wischen und jedem Schritt hinterlassen wir digitale Spuren. 
                  Dieses interaktive Modul beleuchtet die verborgene Welt unserer Daten.
                </p>
              </div>
              <div className="w-48 h-48 relative shrink-0">
                <div className="absolute inset-0 bg-blue-100 rounded-full animate-pulse opacity-50"></div>
                <div className="absolute inset-4 bg-blue-200 rounded-full animate-pulse opacity-70" style={{ animationDelay: '0.5s' }}></div>
                <div className="absolute inset-0 flex items-center justify-center">
                  <Icon name="psychology" size={80} className="text-blue-600 relative z-10" />
                </div>
              </div>
            </div>

            <div className="bg-gradient-to-r from-blue-50 border border-blue-100 p-6 rounded-xl shadow-sm">
              <h3 className="text-lg font-bold text-blue-800 flex items-center gap-2 mb-3">
                <Icon name="info" size={24} /> Dein Lernziel
              </h3>
              <p className="text-blue-900 leading-relaxed">
                Du wirst verstehen, wie die Datenökonomie funktioniert, welche psychologischen Tricks auf dich angewendet werden und wie schnell man scheinbar anonyme Daten entschlüsseln kann. 
                <strong>Klicke auf "Nächstes Thema", um zu starten.</strong>
              </p>
            </div>
          </div>
        );

        const WhatSection = () => {
          const [dataPoints, setDataPoints] = useState({ loc: false, search: false, like: false, scroll: false });
          const score = Object.values(dataPoints).filter(Boolean).length;
          const percentage = (score / 4) * 100;

          return (
            <div className="space-y-6">
              <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Was wird gespeichert?</h2>
              <p className="text-slate-600 leading-relaxed">
                Wir unterscheiden zwischen Daten, die wir <strong>aktiv</strong> hergeben, und solchen, die <strong>passiv</strong> im Hintergrund gesammelt werden. 
              </p>
              
              <div className="bg-white border-2 border-slate-200 p-6 rounded-xl shadow-sm mt-6">
                <h3 className="font-bold text-xl text-slate-800 mb-4 flex items-center gap-2">
                  <Icon name="show_chart" className="text-blue-500" /> Interaktives Experiment: Dein Daten-Rucksack
                </h3>
                <p className="text-slate-600 text-sm mb-4">Klicke auf die Aktionen und beobachte, wie sich dein digitales Profil füllt.</p>
                
                <div className="grid grid-cols-2 gap-3 mb-6">
                  <button 
                    onClick={() => setDataPoints(p => ({...p, loc: true}))}
                    disabled={dataPoints.loc}
                    className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.loc ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
                  >
                    {dataPoints.loc ? <Icon name="check_circle" size={16}/> : '📍'} GPS aktivieren (Passiv)
                  </button>
                  <button 
                    onClick={() => setDataPoints(p => ({...p, search: true}))}
                    disabled={dataPoints.search}
                    className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.search ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
                  >
                    {dataPoints.search ? <Icon name="check_circle" size={16}/> : '🔍'} Google-Suche (Aktiv)
                  </button>
                  <button 
                    onClick={() => setDataPoints(p => ({...p, like: true}))}
                    disabled={dataPoints.like}
                    className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.like ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
                  >
                    {dataPoints.like ? <Icon name="check_circle" size={16}/> : '❤️'} Bild liken (Aktiv)
                  </button>
                  <button 
                    onClick={() => setDataPoints(p => ({...p, scroll: true}))}
                    disabled={dataPoints.scroll}
                    className={`p-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 border ${dataPoints.scroll ? 'bg-green-100 border-green-300 text-green-800' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`}
                  >
                    {dataPoints.scroll ? <Icon name="check_circle" size={16}/> : '⏱️'} Verweildauer (Passiv)
                  </button>
                </div>

                <div>
                  <div className="flex justify-between text-xs font-bold text-slate-500 mb-1">
                    <span>Profil-Genauigkeit</span>
                    <span>{percentage}%</span>
                  </div>
                  <div className="w-full bg-slate-200 rounded-full h-4 overflow-hidden">
                    <div 
                      className="bg-gradient-to-r from-blue-400 to-indigo-600 h-4 rounded-full transition-all duration-700 ease-out" 
                      style={{ width: `${percentage}%` }}
                    ></div>
                  </div>
                  <p className="text-xs text-slate-500 mt-2 text-center h-4">
                    {score === 0 && "Dein Profil ist leer."}
                    {score > 0 && score < 4 && "Es werden erste Muster erkannt..."}
                    {score === 4 && "Algorithmen können dein Verhalten jetzt vorhersagen!"}
                  </p>
                </div>
              </div>
            </div>
          );
        };

        const WhereSection = () => {
          const [animating, setAnimating] = useState(true);

          return (
            <div className="space-y-6">
              <h2 className="text-3xl font-bold text-slate-800 border-b pb-2">Wo und wie werden sie gespeichert?</h2>
              
              <p className="text-slate-600 leading-relaxed">
                Die "Cloud" klingt leicht und flauschig, ist in Wahrheit aber eine gigantische, laute und extrem energiehungrige Infrastruktur aus riesigen Rechenzentren (Serverfarmen).
              </p>

              {/* Animation Container */}
              <div className="bg-slate-900 rounded-xl p-8 my-8 relative overflow-hidden flex flex-col items-center justify-center border border-slate-700 shadow-inner">
                <h3 className="text-white font-semibold mb-6 z-10">Datenfluss in Echtzeit</h3>
                
                <div className="flex items-center justify-between w-full max-w-md relative z-10">
                  <div className="text-center">
                    <div className="bg-slate-800 p-4 rounded-full border border-slate-600 mb-2">
                      <Icon name="smartphone" size={40} className="text-blue-400" />
                    </div>
                    <span className="text-slate-400 text-sm">Dein Gerät</span>
                  </div>

                  {/* Animated Dots */}
                  <div className="flex-1 flex justify-center items-center px-4 overflow-hidden h-10 relative">
                    <div className="w-full h-0.5 bg-slate-700 absolute top-1/2 -translate-y-1/2 z-0"></div>
                    {animating && (
                      <>
                        <div className="w-3 h-3 bg-blue-500 rounded-full absolute animate-slideRight-1 left-0"></div>
                        <div className="w-3 h-3 bg-purple-500 rounded-full absolute animate-slideRight-2 left-0 opacity-0"></div>
                        <div className="w-3 h-3 bg-green-500 rounded-full absolute animate-slideRight-3 left-0 opacity-0"></div>
                      </>
                    )}
                  </div>

                  <div className="text-center">
                    <div className="bg-slate-800 p-4 rounded-full border border-slate-600 mb-2 relative group">
                      <Icon name="cloud" size={40} className="text-indigo-400" />
                      <div className="absolute inset-0 bg-indigo-500 rounded-full opacity-20 blur-xl"></div>
                    </div>
                    <span className="text-slate-400 text-sm">Data Lake</span>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                  <strong className="text-blue-800 block mb-1">Data Lakes</strong>
                  <span className="text-slate-700 text-sm">Statt ordentlicher Tabellen werden heute oft alle Rohdaten in riesige "Seen" geworfen. Erst KIs durchsuchen dieses Chaos später nach Mustern.</span>
                </div>
                <div className="bg-purple-50 p-4 rounded-lg border border-purple-100">
                  <strong className="text-purple-800 block mb-1">Schattenprofile</strong>
                  <span className="text-slate-700 text-sm">Auch wenn du keinen Account hast, verbinden Tracker (Cookies, Fingerprinting) deine Spuren im Netz zu einem versteckten Profil.</span>
                </div>
              </div>
            </div>
          );
        };

        const HowSection = () => {
          const [activeCard, setActiveCard] = useState(null);

          const cards = [
            { id: 1, title: 'Personalisierung', color: 'bg-indigo-100', textColor: 'text-indigo-800', desc: 'Netflix und TikTok nutzen deine Sehgewohnheiten, um das Produkt so "süchtig machend" wie möglich zu machen.' },
            { id: 2, title: 'Mikro-Targeting', color: 'bg-emerald-100', textColor: 'text-emerald-800', desc: 'Werbung wird exakt auf deine Schwächen zugeschnitten (z.B. Snack-Werbung spät abends, wenn du oft wach bist).' },
            { id: 3, title: 'Datenhandel', color: 'bg-rose-100', textColor: 'text-rose-800', desc: 'Schattenfirmen (Data Broker) erstellen Profile über deine Gesundheit oder Bonität und verkaufen diese im Hintergrund.' },
